name: AttendTrack CI/CD

# WHEN does this workflow run?
# - On every push to the 'main' branch
# - On every Pull Request targeting 'main'
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Build Check (runs on every push and PR)
  # Purpose: Catch errors before they reach production
  # ─────────────────────────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest   # GitHub provides this free Linux VM

    steps:
      # Step 1: Download your code onto the runner VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: server/package.json

      # Step 3: Install server dependencies
      - name: Install server dependencies
        working-directory: server
        run: npm install

      # Step 4: Generate Prisma client (validates schema is correct)
      - name: Validate Prisma schema
        working-directory: server
        run: npx prisma generate

      # Step 5: Install client dependencies
      - name: Install client dependencies
        working-directory: client
        run: npm install

      # Step 6: Build the React app (catches any compile-time errors)
      - name: Build client (Vite)
        working-directory: client
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker Images (only on push to main)
  # Purpose: Package app into Docker images and push to Docker Hub
  # Requires: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-check          # Only runs if build-check passed
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to Docker Hub using secrets you set in GitHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Enable Docker Buildx for better caching and multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push the server image
      # Image will be tagged: yourusername/attendtrack-server:latest
      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/attendtrack-server:latest
          cache-from: type=gha    # Use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      # Build and push the client image
      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/attendtrack-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
