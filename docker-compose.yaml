services:
  # ─── PostgreSQL Database ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: attendtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: student_attendance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Express / Prisma Backend ──────────────────────────────────────
  server:
    build: ./server
    container_name: attendtrack-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/student_attendance
      JWT_SECRET: student-attendance-super-secret-jwt-2024
      PORT: 5001
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    ports:
      - "5001:5001"

  # ─── Vite / React Frontend ─────────────────────────────────────────
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
    container_name: attendtrack-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres_data:
